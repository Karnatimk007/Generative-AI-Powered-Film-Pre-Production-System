<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Scriptoria</title>
    <meta name="description" content="Sign in to Scriptoria, your AI Film Pre-Production Studio." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/auth-pages.css" />
  </head>
  <body>
    <!-- Film grain overlay -->
    <div class="film-grain"></div>

    <!-- Film strips -->
    <div class="film-strip top"><div class="strip-roll"></div></div>
    <div class="film-strip bottom"><div class="strip-roll"></div></div>

    <div class="auth-page">
      <!-- Left panel: branding -->
      <div class="auth-brand">
        <div class="brand-inner">
          <div class="brand-badge">✦ AI PRE-PRODUCTION STUDIO ✦</div>
          <h1 class="brand-title">SCRIPTORIA</h1>
          <p class="brand-tagline">From a single idea to a complete<br /><em>production-ready package</em> — in minutes.</p>
          <div class="brand-features">
            <div class="feature-item"><span class="fi-icon">📜</span><span>Screenplay</span></div>
            <div class="feature-item"><span class="fi-icon">👤</span><span>Character Profiles</span></div>
            <div class="feature-item"><span class="fi-icon">🎵</span><span>Sound Design</span></div>
            <div class="feature-item"><span class="fi-icon">🎬</span><span>Shot List</span></div>
            <div class="feature-item"><span class="fi-icon">📋</span><span>Script Breakdown</span></div>
          </div>
        </div>
      </div>

      <!-- Right panel: form -->
      <div class="auth-form-panel">
        <div class="auth-card">
          <div class="auth-card-icon">🎬</div>
          <h2 class="auth-card-title">Welcome Back</h2>
          <p class="auth-card-sub">Sign in to continue to your studio</p>

          <!-- Message banner -->
          <div id="auth-msg" class="auth-msg hidden"></div>

          <form id="form-login" onsubmit="submitLogin(event)" autocomplete="on" novalidate>
            <div class="field-wrap">
              <label class="field-label" for="login-email">📧 Email Address</label>
              <div class="input-row">
                <input
                  type="email"
                  id="login-email"
                  class="field-input"
                  placeholder="director@studio.com"
                  autocomplete="email"
                  required
                  oninput="validateEmail(this, 'ind-email')"
                />
                <span class="field-ind" id="ind-email"></span>
              </div>
            </div>

            <div class="field-wrap">
              <label class="field-label" for="login-password">🔑 Password</label>
              <div class="input-row pw-row">
                <input
                  type="password"
                  id="login-password"
                  class="field-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="pw-eye" onclick="togglePw('login-password', this)" title="Show/hide">👁</button>
              </div>
            </div>

            <button type="submit" id="btn-login" class="auth-btn">
              <span class="auth-btn-inner">
                <span id="btn-icon">✦</span>
                <span id="btn-text">Enter the Studio</span>
              </span>
            </button>
          </form>

          <div class="auth-divider"><span>or</span></div>
          <p class="auth-switch-text">
            New to Scriptoria?
            <a href="/register" class="auth-link">Create a free account →</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      "use strict";

      function validateEmail(input, indId) {
        const el = document.getElementById(indId);
        if (!el || !input.value) { if (el) el.textContent = ""; return; }
        const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value);
        el.textContent = ok ? "✓" : "✗";
        el.className   = "field-ind " + (ok ? "ind-ok" : "ind-err");
      }

      function togglePw(id, btn) {
        const inp = document.getElementById(id);
        inp.type = inp.type === "password" ? "text" : "password";
        btn.textContent = inp.type === "password" ? "👁" : "🙈";
      }

      function showMsg(msg, ok = false) {
        const el = document.getElementById("auth-msg");
        el.innerHTML = `<span>${ok ? "✅" : "⚠️"} ${msg}</span>`;
        el.className = "auth-msg " + (ok ? "msg-ok" : "msg-err");
      }

      function setLoading(on) {
        const btn  = document.getElementById("btn-login");
        const icon = document.getElementById("btn-icon");
        const txt  = document.getElementById("btn-text");
        btn.disabled = on;
        btn.classList.toggle("loading", on);
        icon.innerHTML = on ? '<span class="spin"></span>' : "✦";
        txt.textContent = on ? "Signing in…" : "Enter the Studio";
      }

      async function submitLogin(e) {
        e.preventDefault();
        const email    = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        if (!email || !password) { showMsg("Please fill in both email and password."); return; }

        setLoading(true);
        try {
          const res  = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          
          let data;
          try {
            data = await res.json();
          } catch (e) {
            // Flask returned HTML (e.g. Server crashed due to DB connection)
            showMsg("Server Error (500). Is your MongoDB database running and connected?");
            return;
          }

          if (!res.ok) {
            if (data.error && data.error.includes("No account")) {
              showMsg(data.error + " Redirecting to register…");
              setTimeout(() => window.location.href = "/register", 1800);
            } else {
              showMsg(data.error || "Login failed. Please try again.");
            }
            return;
          }

          showMsg(`Welcome back, ${data.name}! Entering studio…`, true);
          setTimeout(() => window.location.href = "/", 900);
        } catch (err) {
          showMsg("Network error — connection failed.");
        } finally {
          setLoading(false);
        }
      }
    </script>
  </body>
</html>
